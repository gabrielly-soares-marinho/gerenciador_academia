<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Olympus</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="verificarLogin()">

<div class="dashboard">

  <header class="topbar">
    <h2>OLYMPUS GYM</h2>

    <div class="user-info">
      <span id="nomeUsuario"></span>
      <button class="btn-amarelo" onclick="logout()">Sair</button>
    </div>
  </header>

  <main class="cards">

    <div class="card">
      <h3>💪 TREINOS</h3>
      <p>Acesse seus treinos personalizados</p>
    </div>

    <div class="card">
      <h3>📅 AGENDAMENTOS</h3>
      <p>Marque aulas e horários</p>
    </div>

    <div class="card">
      <h3>📊 PROGRESSO</h3>
      <p>Acompanhe sua evolução</p>
    </div>

    <!-- 💳 PLANOS -->
    <div class="card" onclick="irPlanos()">
      <h3>💳 PLANOS</h3>
      <p id="planoAtual">Carregando...</p>
    </div>

    <!-- ✏️ EDITAR USUÁRIO -->
    <div class="card card-editar">
      <h3>⚙️ EDITAR PERFIL</h3>

      <input type="text" id="editNome" placeholder="Novo nome">
      <input type="email" id="editEmail" placeholder="Novo email">
      <input type="password" id="editSenha" placeholder="Nova senha">

      <button class="btn-amarelo" onclick="atualizarUsuario()">
        Atualizar
      </button>
    </div>

  </main>

</div>

<!-- 🔥 AÇÕES EXTRAS -->
<button class="btn-amarelo" onclick="deletarUsuario()" style="background:red; color:white;">
  Excluir Conta
</button>

<button class="btn-amarelo" onclick="irHome()">Home</button>

<script src="js/script.js"></script>

</body>
</html>
