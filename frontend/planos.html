<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Planos - Olympus</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="planos-body">

<div class="planos-container">

  <h2>💳 Escolha seu Plano</h2>

  <div class="planos-grid">

    <div class="plano-card">
      <h3>🥉 Básico</h3>
      <p class="preco">R$ 49/mês</p>
      <p class="desc">Acesso limitado à academia</p>
      <button onclick="escolherPlano(1)">Selecionar</button>
    </div>

    <div class="plano-card destaque">
      <h3>🥈 Intermediário</h3>
      <p class="preco">R$ 79/mês</p>
      <p class="desc">Acesso + aulas em grupo</p>
      <button onclick="escolherPlano(2)">Selecionar</button>
    </div>

    <div class="plano-card">
      <h3>🥇 Premium</h3>
      <p class="preco">R$ 119/mês</p>
      <p class="desc">Acesso total + personal trainer</p>
      <button onclick="escolherPlano(3)">Selecionar</button>
    </div>

  </div>

  <button class="btn-voltar" onclick="voltarDashboard()">⬅ Voltar</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
